<!DOCTYPE html>
<html>

<head>
  <title>Add Record</title>
  <link rel="stylesheet" href="css/style.css">

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
</head>

<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<div class="container">

  <h2>Add New Health Record</h2>

  <!-- FORM -->
  <div class="card">

    <label>Systolic BP</label>
    <input type="number" id="systolic" placeholder="120">

    <label>Diastolic BP</label>
    <input type="number" id="diastolic" placeholder="80">

    <label>SpO2 (%)</label>
    <input type="number" id="spo2" placeholder="98">

    <label>Temperature (°C)</label>
    <input type="number" id="temp" placeholder="36.6">

    <label>Notes (Optional)</label>
    <textarea id="notes" placeholder="Additional info..."></textarea>

    <button onclick="saveRecord()">Save Health Record</button>

  </div>

</div>

<script src="js/firebase.js"></script>
<script src="js/navbar.js"></script>
<script src="js/record.js"></script>

<script>
loadNavbar();
</script>

</body>
</html>
