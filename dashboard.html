<!DOCTYPE html>

<html>

<head>

<title>Health Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>


<body>

<div class="container">


<h1>Health Dashboard</h1>


<div class="grid">


<div class="card">

<h3>Heart Rate</h3>

<div id="hr" class="stat">--</div>

</div>


<div class="card">

<h3>SpO2</h3>

<div id="spo2" class="stat">--</div>

</div>


<div class="card">

<h3>Temperature</h3>

<div id="temp" class="stat">--</div>

</div>


<div class="card">

<h3>Status</h3>

<div id="status" class="stat">Normal</div>

</div>


<div class="card">

<h3>ECG</h3>

<div id="ecg" class="stat">--</div>

</div>


<div class="card">

<h3>Body Temp</h3>

<div id="bodyTemp" class="stat">--</div>

</div>


<div class="card">

<h3>Accel</h3>

<div id="accel" class="stat">--</div>

</div>


</div>


<div class="card chartCard">

<h3>Health Trends</h3>

<canvas id="chart"></canvas>

</div>


<div class="card">

<h3>Previous Records</h3>

<div id="records"></div>

</div>


</div>


<script src="js/firebase.js"></script>

<script src="js/dashboard.js"></script>


</body>

</html>
