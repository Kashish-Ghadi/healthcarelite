<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Health Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="js/firebase.js"></script>

<script defer src="js/dashboard.js"></script>

</head>

<body>

<div class="nav">

<div class="logo">
Health Dashboard
</div>

</div>

<div class="container">

<h2 class="title">
Health Overview
</h2>

<div class="grid">

<div class="card">
<h4>Heart Rate</h4>
<div id="hr" class="stat">--</div>
</div>

<div class="card">
<h4>SpO2</h4>
<div id="spo2" class="stat">--</div>
</div>

<div class="card">
<h4>Temperature</h4>
<div id="temp" class="stat">--</div>
</div>

<div class="card">
<h4>Status</h4>
<div id="status" class="stat">Normal</div>
</div>

</div>

<div class="chartCard">

<h3>Health Trends</h3>

<canvas id="chart"></canvas>

</div>

</div>

</body>

</html>
