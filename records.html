<!DOCTYPE html>
<html>
<head>
<title>All Health Records</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div id="navbar"></div>

<div class="container">

<h2>All Health Records</h2>

<!-- SENSOR DROPDOWN -->
<div class="section">
<div class="section-header" onclick="toggleSection('sensorContent')">
Sensor Records ▼
</div>

<div id="sensorContent" class="section-content">
<div id="sensorRecords"></div>
</div>
</div>

<!-- MANUAL DROPDOWN -->
<div class="section">
<div class="section-header" onclick="toggleSection('manualContent')">
Manual Records ▼
</div>

<div id="manualContent" class="section-content">
<div id="manualRecords"></div>
</div>
</div>

</div>

<!-- POPUP -->
<div id="popup" class="popup">

  <div class="popupCard">

    <h3>Record Details</h3>

    <div id="popupContent"></div>

    <!-- COMPARISON -->
    <canvas id="compareChart"></canvas>

    <!-- ECG -->
    <canvas id="ecgChart" style="margin-top:15px;"></canvas>

    <button onclick="closePopup()" class="primaryBtn">
      Close
    </button>

  </div>

</div>

<script src="js/firebase.js"></script>
<script src="js/navbar.js"></script>
<script src="js/view-records.js"></script>

<script>
loadNavbar();
</script>

</body>
</html>
